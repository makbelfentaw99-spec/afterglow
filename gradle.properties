org.gradle.jvmargs=-Xmx2048m -Dfile.encoding=UTF-8
android.useAndroidX=true
android.nonTransitiveRClass=true
kotlin.code.style=official

# We apply the classic org.jetbrains.kotlin.android plugin explicitly (see
# app/build.gradle.kts) rather than relying on AGP 9's newer built-in Kotlin
# support, so this is turned off to avoid the two setups colliding.
android.builtInKotlin=false
android.newDsl=false
